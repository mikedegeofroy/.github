name: Build & push image
on:
  workflow_call:
    inputs:
      image-name:
        description: Image name under ghcr.io/<owner>/
        required: true
        type: string
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      dockerfile:
        description: Path to Dockerfile relative to context
        required: false
        type: string
        default: Dockerfile
      platforms:
        required: false
        type: string
        default: linux/amd64
    outputs:
      tag:
        description: Tag of the pushed image (branch-shortsha-timestamp)
        value: ${{ jobs.build.outputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TS=$(date -u +%s)
          BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "tag=${BRANCH}-${SHORT_SHA}-${TS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
